# Linux `checks` — the required-green gate (architecture.md §9).
#
# Runs on every push/PR: format, clippy (-D warnings), full workspace build (freecell-app
# compiles on Linux), workspace tests, the render step under Xvfb + Mesa lavapipe, and
# cargo-deny (licenses/advisories, incl. the documented GPL ztracing exception).
#
# The workspace lives in `app/`; the pinned toolchain comes from `app/rust-toolchain.toml`.

name: checks

# Scope the heavy Rust CI to changes that can actually affect it: the `app/` workspace or
# this workflow file. This repo's activity is mostly non-`app/` (specs / experiments / docs),
# and those pushes/PRs have nothing to build here — running the full clippy+build+test+render
# stack on them only burns runner minutes. NOTE: because this is a trigger-level `paths`
# filter, a PR that touches no `app/**` file skips the whole workflow, so the `checks` context
# is never reported. If `checks` is a *required* status check with strict branch protection,
# such a PR will sit "Expected — waiting for status" and cannot merge. That is the intended
# budget trade-off; if it becomes a problem, either mark the check non-required for docs-only
# PRs or replace the trigger filter with an always-running job that gates the heavy STEPS via
# a path-changes detector (e.g. dorny/paths-filter) so one context is always posted.
on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/checks.yml'
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/checks.yml'

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # CI-only build trims (measured locally on a 4-core box comparable to the runner):
  # the checks-job target/ peak drops from ~14 GB to ~6.3 GB (54%), which is what fixes the
  # "No space left on device" during the render-tests link, and the cold build is a bit faster.
  #  - CARGO_INCREMENTAL=0: incremental artifacts are large and useless in CI (~270 MB here,
  #    and rust-cache discards them anyway), so don't generate them.
  #  - *_DEBUG=line-tables-only: keep file:line in panic/test backtraces but drop the heavy
  #    DWARF that dominated target/ and the failing link (render_scene test binary: 684 MB ->
  #    282 MB). TEST inherits DEV, but both are set so the intent survives a profile refactor.
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_PROFILE_TEST_DEBUG: line-tables-only

jobs:
  checks:
    name: fmt / clippy / build / test / render / deny (Linux)
    runs-on: ubuntu-24.04
    steps:
      # ubuntu-24.04 runners have ~14 GB free after their preinstalled toolchains, and a cold
      # debug build of this GPUI/zed-scale workspace peaks target/ right at that ceiling — the
      # render-tests link is where it tips into "No space left on device". Reclaim ~20 GB up
      # front by deleting large preinstalled SDKs this Rust build never touches (Android / .NET
      # / GHC / CodeQL) plus cached docker images. Inlined rather than a third-party action so
      # the exact rm set is auditable and can't change under us (matches this repo's pinning
      # posture, e.g. the exact cargo-deny pin below); the trade-off is we hand-maintain these
      # paths if a future runner image relocates them. rm of a missing path is a harmless no-op,
      # and swap + the apt/cargo/rust caches are left intact.
      - name: Free runner disk (drop preinstalled SDKs unused by this Rust build)
        run: |
          echo "== disk before =="; df -h /
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          echo "== disk after =="; df -h /

      - uses: actions/checkout@v4

      # System deps for the GPUI Linux (blade/Vulkan) build + the render suite, via
      # the ONE canonical setup script (also run by devs/agents locally, so CI and
      # local environments cannot drift): X11/Wayland/xkb, Vulkan loader + lavapipe
      # (software Vulkan) ICD, fontconfig + freetype, gbm, ALSA, the capture tools
      # (Xvfb, ImageMagick `import`, xrefresh, xwininfo), plus DejaVu Serif for the
      # explicit-serif render case. The UI font (Inter) is bundled in the app binary
      # (add_fonts), so no system UI font is needed. See the script header and
      # render-tests/README.md.
      - name: Install system dependencies (capture stack + fonts)
        run: app/render-tests/scripts/setup_render_env.sh

      # Installs the toolchain pinned by app/rust-toolchain.toml. `rustup toolchain
      # install` (no arg) reads the override file; `rustup show` no longer installs on
      # rustup >= 1.28.
      - name: Install pinned toolchain
        working-directory: app
        run: rustup toolchain install

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app

      - name: Format
        working-directory: app
        run: cargo fmt --all --check

      - name: Clippy (-D warnings)
        working-directory: app
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build workspace
        working-directory: app
        run: cargo build --workspace

      - name: Test workspace
        working-directory: app
        run: cargo test --workspace

      # Phase 7: the REQUIRED render-test suite (Xvfb + Mesa lavapipe), replacing the
      # Phase-1 informational spike. Renders the real grid over engine-produced scenes and
      # perceptual-diffs each against a committed baseline. The harness sizes an Xvfb
      # display per case (a small window on a large screen won't present under lavapipe),
      # so this is not wrapped in a single xvfb-run; the script sets FREECELL_RENDER=1.
      # (`cargo test --workspace` above already ran the GPUI-free diff unit tests; without
      # FREECELL_RENDER the pixel cases there skip.)
      - name: Render-test suite (Xvfb + lavapipe)
        working-directory: app
        run: render-tests/scripts/render_tests.sh test

      - name: Upload render failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: render-failures
          path: app/target/render-failures/
          if-no-files-found: ignore

      # Pin the exact cargo-deny the gate was authored + verified against (0.19.9), so a
      # future action bump can't silently change gate behaviour. Installs a prebuilt
      # binary (no compile).
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.9

      - name: cargo-deny
        working-directory: app
        run: cargo deny check
