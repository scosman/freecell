# `macos-verify` — non-required, manual dispatch + weekly cron (architecture.md §9 item 3).
#
# Keeps the primary design target (macOS/Metal) honest without putting slow/expensive
# macOS runners in the merge path. Full build + test on macos-14; the render-harness smoke
# (offscreen Metal capture — round-3 C's validated path) is the FALLBACK if the Linux
# render spike does not hold, and is wired here as the render suite matures (Phase 7).

name: macos-verify

on:
  workflow_dispatch:
  schedule:
    # Weekly, Mondays 06:00 UTC.
    - cron: "0 6 * * 1"

env:
  CARGO_TERM_COLOR: always

jobs:
  macos-verify:
    name: build / test / render smoke (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned toolchain
        working-directory: app
        run: rustup toolchain install

      # `cache-on-failure: true` so a failed weekly/manual run still saves the dep build instead
      # of leaving the next run cold (see checks.yml for the full rationale).
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app
          cache-on-failure: true

      - name: Build workspace
        working-directory: app
        run: cargo build --workspace

      - name: Test workspace
        working-directory: app
        run: cargo test --workspace

      # The Linux Xvfb+lavapipe capture is the PRIMARY, proven pixel gate (Phase-1 spike
      # PASSED; the required `checks` job runs the full render suite there). The macOS
      # offscreen-Metal capture (round-3 C) remains the DOCUMENTED FALLBACK and is not
      # implemented — it is only needed if the Linux path ever regresses. `cargo test
      # --workspace` above already builds `render-tests` on macOS and runs its GPUI-free
      # perceptual-diff unit tests; the pixel cases self-skip here (no lavapipe/xvfb), so no
      # baselines are asserted on macOS.
      - name: Render harness note (macOS pixel capture is a deferred fallback)
        run: echo "Pixel gate lives in the Linux checks job (Xvfb+lavapipe). macOS offscreen-Metal capture is the documented, unimplemented fallback (see render_test_harness.md)."
