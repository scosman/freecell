# Linux `perf-gates` — required-green performance gate (architecture.md §9 item 2).
#
# The perf harness (POC run-test scenario against the real grid + 1M×100 fixture) and its
# committed, buffered thresholds (= 2× the p99 calibrated on this runner image) land in
# Phase 12. Until then this workflow is DEFINED but a placeholder: it builds the workspace
# so the job is real and green, and documents what Phase 12 wires in.

name: perf-gates

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: perf-gates-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  perf-gates:
    name: perf harness (Linux, buffered thresholds)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config cmake \
            libx11-dev libxcb1-dev libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev \
            libvulkan-dev libgbm-dev \
            libfontconfig1-dev libfreetype-dev libasound2-dev \
            mesa-vulkan-drivers vulkan-tools xvfb

      - name: Install pinned toolchain
        working-directory: app
        run: rustup toolchain install

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app

      - name: Build workspace
        working-directory: app
        run: cargo build --workspace

      # TODO(Phase 12): replace this placeholder with the perf harness run, e.g.
      #   xvfb-run -a cargo run -p freecell-app --bin perf --release -- --run-test
      # asserting the committed buffered thresholds (2× calibrated p99) and reporting
      # p50/p99 foreground with `timeout` (CLAUDE.md benchmark convention).
      - name: Perf harness (placeholder until Phase 12)
        run: echo "perf harness + committed thresholds are wired in Phase 12 (architecture.md §9)."
