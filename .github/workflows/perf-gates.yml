# Linux `perf-gates` — required-green performance gate (architecture.md §9 item 2).
#
# Runs the Phase-12 perf harness: the POC "Run Test" scenario against the REAL GridView over a
# 1M×100 styled engine-backed fixture, under Xvfb + Mesa lavapipe. It measures the CPU
# render-build path (representative under software Vulkan; GPU present is NOT and is not gated)
# plus the engine-call counter, and HARD-FAILS at the committed buffered thresholds
# (= 2× the p99 calibrated on this runner image — render-tests/src/perf.rs `CI_*`) and on the
# zero-engine-calls-on-scroll gate. Real-hardware budgets (8.33 ms / 2 ms) stay the product
# truth, checked on macos-verify. Recalibrate only deliberately (a committed change).

name: perf-gates

# Scoped to `app/**` + this workflow file, same as `checks.yml` — a spec/docs/experiments
# change can't move these perf numbers, so it shouldn't spend a release build's worth of
# runner minutes here. See the note in checks.yml about trigger-level `paths` filters and
# required status checks (a PR touching no `app/**` file skips this workflow entirely).
on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/perf-gates.yml'
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/perf-gates.yml'

concurrency:
  group: perf-gates-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # No incremental artifacts in CI (large + useless; rust-cache discards them). The release
  # profile already emits no debug info, so no debug trim is needed here — the disk win for
  # this job comes from the free-disk step below.
  CARGO_INCREMENTAL: "0"

jobs:
  perf-gates:
    name: perf harness (Linux, buffered thresholds)
    runs-on: ubuntu-24.04
    steps:
      # Same disk reclaim as checks.yml: the release build of this GPUI/zed-scale tree is large,
      # and this job also lacked any headroom step. See checks.yml for the full rationale.
      - name: Free runner disk (drop preinstalled SDKs unused by this Rust build)
        run: |
          echo "== disk before =="; df -h /
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          echo "== disk after =="; df -h /

      - uses: actions/checkout@v4

      # Build deps for the GPUI (blade/Vulkan) release build + the perf harness's virtual
      # display. This is intentionally a lean SUBSET of app/render-tests/scripts/setup_render_env.sh
      # (that script's canonical build-dep list is the source of truth): the perf harness needs
      # only xvfb + the lavapipe ICD, not the full capture stack (ImageMagick / x11 tools / the
      # explicit-serif font), so we skip those to keep this job fast. Keep the build-dep portion
      # below in sync with setup_render_env.sh if the GPUI build deps ever change.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config cmake \
            libx11-dev libxcb1-dev libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev \
            libvulkan-dev libgbm-dev \
            libfontconfig1-dev libfreetype-dev libasound2-dev \
            mesa-vulkan-drivers vulkan-tools xvfb

      - name: Install pinned toolchain
        working-directory: app
        run: rustup toolchain install

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app

      # The harness builds itself in release (perf numbers must be optimized — CLAUDE.md) and
      # runs FOREGROUND under Xvfb + lavapipe, HARD-FAILING at the committed buffered thresholds
      # (render-tests/src/perf.rs `CI_*`) + the zero-engine-calls-on-scroll gate. The run stamps
      # its environment (CPU / OS / rustc / lavapipe) into the printed report + results JSON.
      # `timeout` is belt-and-braces (CLAUDE.md benchmark convention) around the build+run — the
      # harness is already internally bounded (DRAIN_CAP); 30 min covers a cold-cache release
      # build and fails cleanly rather than hanging the job.
      - name: Perf harness (Linux, buffered thresholds — hard gate)
        working-directory: app
        env:
          FREECELL_COMMIT: ${{ github.sha }}
        run: timeout 1800 render-tests/scripts/perf.sh gate

      - name: Upload perf report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-runtest
          path: app/render-tests/results/perf-runtest.json
          if-no-files-found: warn
