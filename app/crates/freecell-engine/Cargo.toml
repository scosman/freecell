[package]
name = "freecell-engine"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
publish = false
description = "IronCalc adapter, evaluation worker, style/geometry caches, and file I/O for FreeCell. GPUI-free: builds and tests headless in Linux CI (architecture.md ┬ž2, ┬ž5, ┬ž6)."

[dependencies]
freecell-core.workspace = true
ironcalc_base.workspace = true
# Phase 3 (Document I/O): `ironcalc` is the umbrella crate carrying the xlsx load/save API
# (`import::load_from_xlsx`, `export::save_xlsx_to_writer`, `error::XlsxError`); `thiserror`
# backs the typed `LoadError`/`SaveError`; `tempfile` provides the atomic temp-file+rename
# save. `tracing` (worker apply/eval/publish timings) still arrives with the Phase-4 worker;
# its pin stays in the workspace dependency table until then.
ironcalc.workspace = true
thiserror.workspace = true
tempfile.workspace = true

[lints]
workspace = true
